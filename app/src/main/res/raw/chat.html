        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search || url.hash.substring(1));
        const campaignParams = {};
        Object.entries(paramMapping).forEach(([utmKey, campaignKey]) => {
            if (params.has(utmKey)) {
                campaignParams[campaignKey] = params.get(utmKey);

        });
        return campaignParams;
    } catch (error) {
        console.error("Error parsing URL parameters:", error);
        return {};
    }

function getCleanPageLocation() {
    try {
        const url = new URL(window.location.href);
        [...url.searchParams.keys()].forEach(param => {
            if (paramMapping[param]) {
                url.searchParams.delete(param);
            }
        });
        return url.origin + url.pathname + url.search;

        console.error("Error generating clean page_location:", error);

te geben Sie Ihre Schlüsselwörter unten ein.",ja:"特に関心のあるトピックはありますか？以下にキーワードを入力してください。",ko:"특별히 관심 있는 주제가 있으신가요? 아래에 키워드를 입력해 주세요.",pt:"Você tem algum tópico de interesse específico? Por favor, insira suas palavras-chave abaixo.",it:"Hai degli argomenti di interesse specifico? Inserisci le tue parole chiave qui sotto.","zh-TW":"您是否有特別關注的話題？請在下方輸入您感興趣的關鍵詞。","zh-HK":"您是否有特別關注的話題？請在下方輸入您感興趣的關鍵詞。",ru:"Есть ли у вас конкретные темы, которые вас интересуют? Пожалуйста, введите ваши ключевые слова ниже."},input_custom_interests_detail:{zh:"<p>您可以通过输入话题、类型、人物、地域、栏目、作者等关键词来定制您关注的FT内容，确保不错过任何重要资讯。</p><p>即使您关注的话题在FT没有对应的标签，你也可以关注自己输入的话题，让我们的人工智能语义搜索来协助您发现相关的最新内容。</p>",en:"<p>You can customize the FT content you follow by entering keywords such as topics, types, people, regions, columns, authors, etc., ensuring you don't miss any important information.</p><p>Even if the topic you are interested in doesn't have a direct label in FT, you can still follow it by entering it, and our AI semantic search will assist you in discovering the most relevant latest content.</p>",es:"<p>Puede personalizar el contenido de FT que sigue introduciendo palabras clave como temas, tipos, personas, regiones, columnas, autores, etc., asegurándose de no perderse ninguna información importante.</p><p>Incluso si el tema que le interesa no tiene una etiqueta directa en FT, aún puede seguirlo ingresándolo, y nuestra búsqueda semántica de IA le ayudará a descubrir el contenido más reciente y relevante.</p>",fr:"<p>Vous pouvez personnaliser le contenu FT que vous suivez en saisissant des mots-clés tels que sujets, types, personnes, régions, colonnes, auteurs, etc., pour ne manquer aucune information importante.</p><p>Même si le sujet qui vous intéresse n'a pas d'étiquette directe dans FT, vous pouvez le suivre en le saisissant, et notre recherche sémantique IA vous aidera à découvrir le contenu le plus pertinent et le plus récent.</p>",de:"<p>Sie können den FT-Inhalt, den Sie verfolgen, anpassen, indem Sie Schlüsselwörter wie Themen, Typen, Personen, Regionen, Spalten, Autoren usw. eingeben, um sicherzustellen, dass Sie keine wichtigen Informationen verpassen.</p><p>Auch wenn das Thema, das Sie interessiert, keine direkte Kennzeichnung in FT hat, können Sie es dennoch verfolgen, indem Sie es eingeben, und unsere KI-basierte semantische Suche wird Ihnen helfen, die relevantesten neuesten Inhalte zu entdecken.</p>",ja:"<p>話題、タイプ、人物、地域、コラム、著者などのキーワードを入力することで、フォローしているFTコンテンツをカスタマイズし、重要な情報を逃さないようにできます。</p><p>興味のあるトピックにFT内で直接的なラベルがなくても、それを入力することでフォローでき、当社のAIセマンティック検索が最も関連性の高い最新コンテンツを発見するお手伝いをします。</p>",ko:"<p>주제, 유형, 인물, 지역, 칼럼, 저자 등의 키워드를 입력함으로써, 당신이 팔로우하는 FT 콘텐츠를 맞춤화하여 중요한 정보를 놓치지 않도록 할 수 있습니다.</p><p>관심 있는 주제에 FT에서 직접적인 라벨이 없더라도 그 주제를 입력하여 팔로우할 수 있으며, 우리의 AI 의미 검색이 가장 관련성 높은 최신 콘텐츠를 발견하는 데 도움을 줄 것입니다.</p>",pt:"<p>Você pode personalizar o conteúdo da FT que segue, inserindo palavras-chave como tópicos, tipos, pessoas, regiões, colunas, autores, etc., garantindo que você não perca nenhuma informação importante.</p><p>Mesmo que o tema de seu interesse não tenha uma etiqueta direta na FT, você ainda pode segui-lo inserindo-o, e nossa busca semântica de IA ajudará você a descobrir o conteúdo mais relevante e atualizado.</p>",it:"<p>Puoi personalizzare i contenuti FT che segui inserendo parole chiave come argomenti, tipi, persone, regioni, colonne, autori, ecc., per assicurarti di non perdere nessuna informazione importante.</p><p>Anche se l'argomento di tuo interesse non ha un'etichetta diretta in FT, puoi comunque seguirlo inserendolo, e la nostra ricerca semantica AI ti aiuterà a scoprire i contenuti più recenti e rilevanti.</p>","zh-TW":"<p>您可以透過輸入話題、類型、人物、地區、專欄、作者等關鍵詞來訂製您關注的FT內容，確保不錯過任何重要資訊。</p><p>即使您關注的話題在FT沒有對應的標籤，您也可以輸入自己關注的話題，讓我們的人工智能語義搜尋協助您發現相關的最新內容。</p>","zh-HK":"<p>您可以透過輸入話題、類型、人物、地區、專欄、作者等關鍵詞來訂製您關注的FT內容，確保不錯過任何重要資訊。</p><p>即使您關注的話題在FT沒有對應的標籤，您也可以輸入自己關注的話題，讓我們的人工智能語義搜尋協助您發現相關的最新內容。</p>",ru:"<p>Вы можете настраивать содержание FT, которое вы следите, вводя ключевые слова, такие как темы, типы, люди, регионы, колонки, авторы и т. д., чтобы не пропустить никакой важной информации.</p><p>Даже если интересующая вас тема не имеет прямой метки в FT, вы можете следить за ней, вводя ее, и наш семантический поиск на базе ИИ поможет вам обнаружить наиболее актуальный и релевантный контент.</p>"},Introduction:{en:"Welcome to ChatFTC, your personal FT assistant. You can ask me to summarise FT articles, explain context, follow topics you care about and continue the discussion, helping you get more value from your premium subscription.",es:"Bienvenido a ChatFTC, tu asistente personal de FT. Puedes pedirme que resuma artículos de FT, explique el contexto, siga los temas que te interesan y continúe la conversación para ayudarte a sacar más valor de tu suscripción premium.",fr:"Bienvenue dans ChatFTC, votre assistant FT personnel. Vous pouvez me demander de résumer des articles du FT, d’expliquer le contexte, de suivre les sujets qui vous intéressent et de poursuivre la discussion afin de tirer davantage de valeur de votre abonnement premium.",de:"Willkommen bei ChatFTC, Ihrem persönlichen FT-Assistenten. Sie können mich bitten, FT-Artikel zusammenzufassen, Hintergründe zu erklären, Themen zu verfolgen, die Sie interessieren, und die Diskussion fortzusetzen, damit Sie mehr Wert aus Ihrem Premium-Abonnement ziehen.",ja:"ChatFTCへようこそ。FTのパーソナルアシスタントとして、FT記事の要約、背景の解説、関心のあるトピックの追跡、さらに深い議論をお手伝いし、プレミアム購読の価値をより高めます。",ko:"ChatFTC에 오신 것을 환영합니다. 개인 FT 어시스턴트로서 FT 기사 요약, 배경 설명, 관심 주제 추적, 이어지는 토론을 도와 프리미엄 구독의 가치를 더 잘 활용할 수 있게 합니다.",pt:"Bem-vindo ao ChatFTC, seu assistente pessoal do FT. Você pode me pedir para resumir artigos do FT, explicar contextos, acompanhar temas do seu interesse e continuar a discussão, ajudando você a obter mais valor da sua assinatura premium.",it:"Benvenuto in ChatFTC, il tuo assistente personale FT. Puoi chiedermi di riassumere articoli del FT, spiegare il contesto, seguire i temi che ti interessano e continuare la discussione, aiutandoti a ottenere più valore dal tuo abbonamento premium.","zh-TW":"歡迎使用ChatFTC，專屬於您的FT助理。您可以讓我總結FT文章、解釋背景、追蹤您關注的話題，並繼續延伸討論，幫助您更充分使用高端訂閱權益。","zh-HK":"歡迎使用ChatFTC，專屬於您的FT助理。您可以讓我總結FT文章、解釋背景、追蹤您關注的話題，並繼續延伸討論，幫助您更充分使用高端訂閱權益。",zh:"欢迎使用ChatFTC，专属于您的FT助理。您可以让我总结FT文章、解释背景、追踪您关注的话题，并继续延展讨论，帮助您更充分使用高端订阅权益。",ru:"Добро пожаловать в ChatFTC, ваш персональный помощник FT. Вы можете попросить меня кратко изложить статьи FT, объяснить контекст, отслеживать интересующие вас темы и продолжить обсуждение, чтобы получить больше пользы от премиум-подписки."},premium:{zh:"高端",en:"premium",es:"premium",fr:"premium",de:"Premium",ja:"プレミアム",ko:"프리미엄",pt:"premium",it:"premium","zh-TW":"高端","zh-HK":"高端",ru:"премиум"},standard:{zh:"标准",en:"standard",es:"estándar",fr:"standard",de:"Standard",ja:"スタンダード",ko:"스탠다드",pt:"padrão",it:"standard","zh-TW":"標準","zh-HK":"標準",ru:"стандартный"},PromotionInIntroduction:{zh:"从2024年10月30日至11月12日，邀请您免费体验，专门为高端会员量身定制的内容推荐和深度分析，协助您充分利用您的订阅。",en:"From October 30 to November 12, 2024, we invite you to a free trial experience, offering customized content recommendations and in-depth analysis specifically tailored for premium members to help you fully utilize your subscription.",es:"Del 30 de octubre al 12 de noviembre de 2024, te invitamos a una experiencia gratuita, ofreciendo recomendaciones de contenido personalizadas y análisis profundos específicamente adaptados para los miembros premium para ayudarte a aprovechar al máximo tu suscripción.",fr:"Du 30 octobre au 12 novembre 2024, nous vous invitons à une expérience d'essai gratuite, offrant des recommandations de contenu personnalisées et des analyses approfondies spécialement adaptées pour les membres premium afin de vous aider à tirer pleinement parti de votre abonnement.",de:"Vom 30. Oktober bis 12. November 2024 laden wir Sie zu einem kostenlosen Testangebot ein, das speziell für Premium-Mitglieder maßgeschneiderte Inhaltsvorschläge und tiefgehende Analysen bietet, um Ihnen zu helfen, Ihr Abonnement voll auszunutzen.",ja:"2024年10月30日から11月12日まで、プレミアム会員向けに特別にカスタマイズされたコンテンツの推薦と深い分析を提供する無料体験をご招待します。",ko:"2024년 10월 30일부터 11월 12일까지, 프리미엄 회원을 위해 특별히 맞춤화된 콘텐츠 추천과 심층 분석을 제공하는 무료 체험을 초대합니다.",pt:"De 30 de outubro a 12 de novembro de 2024, convidamos você para uma experiência gratuita, oferecendo recomendações de conteúdo personalizadas e análises aprofundadas especialmente adaptadas para membros premium, para ajudá-lo a aproveitar ao máximo sua assinatura.",it:"Dal 30 ottobre al 12 novembre 2024, ti invitiamo a una prova gratuita, offrendo raccomandazioni di contenuto personalizzate e analisi approfondite specificamente adattate per i membri premium per aiutarti a sfruttare al massimo la tua sottoscrizione.","zh-TW":"從2024年10月30日至11月12日，邀請您免費體驗，專門為高端會員量身定制的內容推薦和深度分析，協助您充分利用您的訂閱。","zh-HK":"從2024年10月30日至11月12日，邀請您免費體驗，專門為高端會員量身定制的內容推薦和深度分析，協助您充分利用您的訂閱。",ru:"С 30 октября по 12 ноября 2024 года мы приглашаем вас на бесплатный пробный период, предлагая индивидуальные рекомендации по контенту и глубокий анализ, специально адаптированные для премиум-участников, чтобы помочь вам максимально использовать вашу подписку."},PromotionActionButton:{zh:"75折订阅",en:"Subscribe at 25% off",es:"Suscríbete ahora y disfruta de un 25% de descuento",fr:"Abonnez-vous maintenant et bénéficiez de 25% de réduction",de:"Abonnieren Sie jetzt und genießen Sie 25% Rabatt",ja:"今すぐ購読して、25％割引をお楽しみください",ko:"지금 구독하고 25% 할인 받으세요",pt:"Assine agora e aproveite um desconto de 25%",it:"Abbonati ora e goditi il 25% di sconto","zh-TW":"75折訂閱","zh-HK":"75折訂閱",ru:"Подпишитесь сейчас и получите скидку 25%"},IntroductionFTAcademy:{zh:"欢迎使用专属于您的FT商学院助理！我的目标是利用FT的优质内容，帮助您提升自己。",en:"Welcome to your personal FT Academy assistant! My goal is to leverage FT's high-quality content to help you improve yourself.",es:"¡Bienvenido a tu asistente personal de la Academia FT! Mi objetivo es aprovechar el contenido de alta calidad de FT para ayudarte a mejorar.",fr:"Bienvenue à votre assistant personnel de l'Académie FT ! Mon objectif est de tirer parti du contenu de haute qualité du FT pour vous aider à vous améliorer.",de:"Willkommen bei Ihrem persönlichen FT Academy-Assistenten! Mein Ziel ist es, die hochwertigen Inhalte des FT zu nutzen, um Ihnen bei Ihrer Weiterentwicklung zu helfen.",ja:"FTアカデミーのパーソナルアシスタントへようこそ！私の目標は、FTの高品質なコンテンツを活用して、あなたの成長を支援することです。",ko:"개인 FT 아카데미 어시스턴트에 오신 것을 환영합니다! 나의 목표는 FT의 고품질 콘텐츠를 활용하여 여러분의 성장을 돕는 것입니다.",pt:"Bem-vindo ao seu assistente pessoal da Academia FT! Meu objetivo é aproveitar o conteúdo de alta qualidade da FT para ajudá-lo a melhorar.",it:"Benvenuto nel tuo assistente personale dell'Accademia FT! Il mio obiettivo è sfruttare i contenuti di alta qualità del FT per aiutarti a migliorare te stesso.","zh-TW":"歡迎使用專屬於您的FT商學院助理！我的目標是利用FT的優質內容，幫助您提升自己。","zh-HK":"歡迎使用專屬於您的FT商學院助理！我的目標是利用FT的優質內容，幫助您提升自己。",ru:"Добро пожаловать в вашего персонального помощника от FT Academy! Моя цель - использовать качественный контент FT, чтобы помочь вам улучшить себя."},IntroductionDailyEnglish:{zh:"欢迎使用专属于您的每日英语小助理！我的目标是利用FT的优质英文内容来为您服务。",en:"Welcome to your personal Daily English assistant! My goal is to leverage FT's high-quality English content to serve you.",es:"¡Bienvenido a tu asistente personal de inglés diario! Mi objetivo es aprovechar el contenido en inglés de alta calidad de FT para servirte.",fr:"Bienvenue à votre assistant personnel d'anglais quotidien ! Mon objectif est de tirer parti du contenu en anglais de haute qualité du FT pour vous servir.",de:"Willkommen bei Ihrem persönlichen Daily English-Assistenten! Mein Ziel ist es, die hochwertigen englischen Inhalte des FT zu nutzen, um Sie zu unterstützen.",ja:"毎日の英語の個人アシスタントへようこそ！私の目標は、FTの高品質な英語コンテンツを活用してあなたに役立つことです。",ko:"개인 맞춤형 매일 영어 어시스턴트에 오신 것을 환영합니다! 나의 목표는 FT의 고품질 영어 콘텐츠를 활용하여 여러분을 지원하는 것입니다.",pt:"Bem-vindo ao seu assistente pessoal de inglês diário! Meu objetivo é aproveitar o conteúdo em inglês de alta qualidade do FT para servi-lo.",it:"Benvenuto nel tuo assistente personale di inglese quotidiano! Il mio obiettivo è sfruttare i contenuti in inglese di alta qualità del FT per servirti.","zh-TW":"歡迎使用專屬於您的每日英語小助理！我的目標是利用FT的優質英文內容來為您服務。","zh-HK":"歡迎使用專屬於您的每日英語小助理！我的目標是利用FT的優質英文內容來為您服務。",ru:"Добро пожаловать в вашего персонального помощника по ежедневному английскому языку! Моя цель - использовать качественный английский контент FT, чтобы помочь вам."},IntroductionVideoAudio:{zh:"欢迎使用专属于您的视频和音频助理！您可以在这里查看FT最新发布的视频和音频内容。",en:"Welcome to your personal Video and Audio assistant! Here, you can view the latest videos and audio content released by FT.",es:"¡Bienvenido a tu asistente personal de video y audio! Aquí, puedes ver los últimos videos y contenido de audio publicados por FT.",fr:"Bienvenue à votre assistant personnel vidéo et audio ! Ici, vous pouvez visionner les dernières vidéos et contenus audio publiés par FT.",de:"Willkommen bei Ihrem persönlichen Video- und Audio-Assistenten! Hier können Sie die neuesten Videos und Audio-Inhalte von FT ansehen.",ja:"動画と音声のパーソナルアシスタントへようこそ！こちらでは、FTが最新に公開した動画や音声コンテンツをご覧いただけます。",ko:"개인 맞춤형 비디오 및 오디오 어시스턴트에 오신 것을 환영합니다! 여기에서 FT가 최신으로 게시한 비디오 및 오디오 콘텐츠를 확인할 수 있습니다.",pt:"Bem-vindo ao seu assistente pessoal de vídeo e áudio! Aqui, você pode visualizar os vídeos e conteúdos de áudio mais recentes lançados pela FT.",it:"Benvenuto nel tuo assistente personale per video e audio! Qui puoi visualizzare gli ultimi video e contenuti audio pubblicati da FT.","zh-TW":"歡迎使用專屬於您的影音助理！您可以在這裡查看FT最新發布的影音內容。","zh-HK":"歡迎使用專屬於您的影音助理！您可以在這裡查看FT最新發布的影音內容。",ru:"Добро пожаловать в вашего персонального помощника по видео и аудио! Здесь вы можете просматривать последние видео- и аудиоконтенты, выпущенные FT."},IntroductionCustomerService:{zh:"欢迎使用专属于您的FT客户服务助理！您对于我们的服务有任何问题，让我尽力为您解答。",en:"Welcome to your personal FT Customer Service assistant! If you have any questions regarding our services, let me do my best to assist you.",es:"¡Bienvenido a tu asistente personal de Servicio al Cliente de FT! Si tienes alguna pregunta sobre nuestros servicios, permíteme hacer todo lo posible para ayudarte.",fr:"Bienvenue à votre assistant personnel du Service Client FT ! Si vous avez des questions concernant nos services, laissez-moi faire de mon mieux pour vous aider.",de:"Willkommen bei Ihrem persönlichen FT-Kundenservice-Assistenten! Wenn Sie Fragen zu unseren Dienstleistungen haben, lassen Sie mich mein Bestes tun, um Ihnen zu helfen.",ja:"FTカスタマーサービスのパーソナルアシスタントへようこそ！私はいつでもご質問にお答えするため、最善を尽くします。",ko:"개인 맞춤형 FT 고객 서비스 어시스턴트에 오신 것을 환영합니다! 서비스에 관한 질문이 있으시면 최선을 다해 도와드리겠습니다.",pt:"Bem-vindo ao seu assistente pessoal de Serviço de Atendimento ao Cliente da FT! Se você tiver alguma dúvida sobre nossos serviços, deixe-me fazer o meu melhor para ajudá-lo.",it:"Benvenuto nel tuo assistente personale del Servizio Clienti FT! Se hai domande sui nostri servizi, lascia che faccia del mio meglio per assisterti.","zh-TW":"歡迎使用專屬於您的FT客戶服務助理！您對於我們的服務有任何問題，讓我盡力為您解答。","zh-HK":"歡迎使用專屬於您的FT客戶服務助理！您對於我們的服務有任何問題，讓我盡力為您解答。",ru:"Добро пожаловать в вашего персонального помощника по обслуживанию клиентов FT! Если у вас есть вопросы по нашим услугам, позвольте мне сделать все возможное, чтобы помочь вам."},OtherReason:{en:"Other reason",es:"Otra razón",fr:"Autre raison",de:"Andere Gründe",ja:"その他の理由",ko:"기타 이유",pt:"Outro motivo",it:"Altro motivo","zh-TW":"其他原因","zh-HK":"其他原因",zh:"其他原因",ru:"Другая причина"},Error:{en:"Error",es:"Error",fr:"Erreur",de:"Fehler",ja:"エラー",ko:"오류",pt:"Erro",it:"Errore","zh-TW":"錯誤","zh-HK":"錯誤",zh:"错误",ru:"Ошибка"},CustomerService:{zh:"帮助中心",en:"Help Center",es:"Centro de Ayuda",fr:"Centre d'Aide",de:"Hilfezentrum",ja:"ヘルプセンター",ko:"도움말 센터",pt:"Centro de Ajuda",it:"Centro Assistenza","zh-TW":"幫助中心","zh-HK":"幫助中心",ru:"Центр Поддержки"},DailyEnglish:{zh:"每日英语",en:"Daily English",es:"Inglés Diario",fr:"Anglais Quotidien",de:"Tägliches Englisch",ja:"デイリー・イングリッシュ",ko:"매일 영어",pt:"Inglês Diário",it:"Inglese Quotidiano","zh-TW":"每日英語","zh-HK":"每日英語",ru:"Ежедневный Английский"},FTAcademy:{zh:"FT商学院",en:"FT Academy",es:"FT Academia",fr:"Académie FT",de:"FT Akademie",ja:"FTアカデミー",ko:"FT 아카데미",pt:"Academia FT",it:"Accademia FT","zh-TW":"FT商學院","zh-HK":"FT商學院",ru:"Академия FT"},VideoAudio:{zh:"视频与音频",en:"Video and Audio",es:"Video y Audio",fr:"Vidéo et Audio",de:"Video und Audio",ja:"ビデオとオーディオ",ko:"비디오와 오디오",pt:"Vídeo e Áudio",it:"Video e Audio","zh-TW":"影片和音頻","zh-HK":"影片和音頻",ru:"Видео и Аудио"},ProcessingRequest:{en:"Your request is being processed...",zh:"您的请求正在处理中...",es:"Su solicitud está siendo procesada...",fr:"Votre demande est en cours de traitement...",de:"Ihre Anfrage wird bearbeitet...",ja:"リクエストを処理中です...",ko:"요청이 처리 중입니다...",pt:"Sua solicitação está sendo processada...",it:"La tua richiesta è in elaborazione...","zh-TW":"您的請求正在處理中...","zh-HK":"您的請求正在處理中...",ru:"Ваш запрос обрабатывается..."},NEXT:{en:"NEXT",zh:"下一步",es:"SIGUIENTE",fr:"SUIVANT",de:"WEITER",ja:"次へ",ko:"다음",pt:"PRÓXIMO",it:"PROSSIMO","zh-TW":"下一步","zh-HK":"下一步",ru:"ДАЛЕЕ"},FINISH:{en:"FINISH",zh:"完成",es:"FINALIZAR",fr:"TERMINER",de:"BEENDEN",ja:"終了",ko:"완료",pt:"FINALIZAR",it:"FINIRE","zh-TW":"完成","zh-HK":"完成",ru:"ЗАВЕРШИТЬ"},"Top News For Me":{zh:"有什么值得我关注的要闻吗？",en:"What are the top news for me?",es:"¿Cuáles son las noticias principales para mí?",fr:"Quelles sont les principales nouvelles pour moi ?",de:"Was sind die Top-Nachrichten für mich?",ja:"私にとってのトップニュースは何ですか？",ko:"내게 맞는 주요 뉴스는 무엇인가요?",pt:"Quais são as principais notícias para mim?",it:"Quali sono le principali notizie per me?","zh-TW":"有什麼值得我關注的要聞嗎？","zh-HK":"有什麼值得我關注的要聞嗎？",ru:"Какие главные новости для меня?"},"Most Popular":{zh:"FT上有哪些热门文章？",en:"What are the most popular articles on the FT?",es:"¿Cuáles son los artículos más populares en el FT?",fr:"Quels sont les articles les plus populaires sur le FT?",de:"Was sind die beliebtesten Artikel auf der FT?",ja:"FTで最も人気のある記事は何ですか？",ko:"FT에서 가장 인기 있는 기사는 무엇인가요?",pt:"Quais são os artigos mais populares no FT?",it:"Quali sono gli articoli più popolari su FT?","zh-TW":"FT上有哪些熱門文章？","zh-HK":"FT上有哪些熱門文章？",ru:"Какие самые популярные статьи в FT?"},MyFT:{zh:"我的FT",en:"MyFT",es:"MiFT",fr:"MonFT",de:"MeinFT",ja:"マイFT",ko:"마이FT",pt:"MeuFT",it:"MioFT","zh-TW":"我的FT","zh-HK":"我的FT",ru:"МойFT"},chat_error_content_filter:{zh:"<p>我们的AI服务提供商返回了以下错误：</p><p>由于提示触发了Azure OpenAI的内容管理策略，响应被过滤。请修改您的提示并重试。</p><p>这可能不是您的错。但目前，请刷新并与我们的聊天机器人讨论其他事情。</p>",en:"<p>Our AI service vendor returns the following error: </p><p>The response was filtered due to the prompt triggering Azure OpenAI’s content management policy. Please modify your prompt and retry. </p><p>It's probably not your fault. But for the time being, please refresh and talk about other things with our chat bot. </p>",es:"<p>Nuestro proveedor de servicios de IA devolvió el siguiente error:</p><p>La respuesta fue filtrada debido a que el mensaje activó la política de gestión de contenido de Azure OpenAI. Por favor, modifique su mensaje e intente nuevamente.</p><p>Probablemente no sea su culpa. Pero por el momento, por favor recargue la página y hable de otras cosas con nuestro chat bot.</p>",fr:"<p>Notre fournisseur de services IA a retourné l'erreur suivante :</p><p>La réponse a été filtrée en raison du déclenchement par la requête de la politique de gestion de contenu d'Azure OpenAI. Veuillez modifier votre requête et réessayer.</p><p>Ce n'est probablement pas de votre faute. Mais pour le moment, veuillez rafraîchir et parler d'autres choses avec notre chatbot.</p>",de:"<p>Unser AI-Dienstanbieter hat den folgenden Fehler zurückgegeben:</p><p>Die Antwort wurde gefiltert, da die Eingabe die Inhaltsverwaltungsrichtlinie von Azure OpenAI ausgelöst hat. Bitte ändern Sie Ihre Eingabe und versuchen Sie es erneut.</p><p>Es ist wahrscheinlich nicht Ihre Schuld. Aber im Moment, bitte aktualisieren Sie und sprechen Sie mit unserem Chat-Bot über andere Dinge.</p>",ja:"<p>当社のAIサービスベンダーは次のエラーを返しました：</p><p>プロンプトがAzure OpenAIのコンテンツ管理ポリシーをトリガーしたため、応答がフィルタリングされました。プロンプトを修正して再試行してください。</p><p>おそらくあなたのせいではありません。しかし、今のところ、リフレッシュして、チャットボットと他のことについて話してください。</p>",ko:"<p>우리의 AI 서비스 제공업체가 다음 오류를 반환했습니다:</p><p>프롬프트가 Azure OpenAI의 콘텐츠 관리 정책을 트리거했기 때문에 응답이 필터링되었습니다. 프롬프트를 수정하고 다시 시도하십시오.</p><p>아마 당신의 잘못이 아닐 것입니다. 하지만 지금은 새로고침하고 채팅 봇과 다른 주제로 이야기해 주세요.</p>",pt:"<p>Nosso fornecedor de serviços de IA retornou o seguinte erro:</p><p>A resposta foi filtrada devido ao acionamento da política de gerenciamento de conteúdo do Azure OpenAI. Por favor, modifique seu prompt e tente novamente.</p><p>Provavelmente não é sua culpa. Mas, por enquanto, por favor, atualize a página e fale sobre outras coisas com o nosso chat bot.</p>",it:"<p>Il nostro fornitore di servizi AI ha restituito il seguente errore:</p><p>La risposta è stata filtrata a causa del prompt che ha attivato la politica di gestione dei contenuti di Azure OpenAI. Modifica il tuo prompt e riprova.</p><p>Probabilmente non è colpa tua. Ma per il momento, aggiorna la pagina e parla di altre cose con il nostro chat bot.</p>","zh-TW":"<p>我們的AI服務提供商返回了以下錯誤：</p><p>由於提示觸發了Azure OpenAI的內容管理策略，響應被過濾。請修改您的提示並重試。</p><p>這可能不是您的錯。但目前，請刷新並與我們的聊天機器人討論其他事情。</p>","zh-HK":"<p>我們的AI服務提供商返回了以下錯誤：</p><p>由於提示觸發了Azure OpenAI的內容管理策略，響應被過濾。請修改您的提示並重試。</p><p>這可能不是您的錯。但目前，請刷新並與我們的聊天機器人討論其他事情。</p>",ru:"<p>Наш поставщик услуг AI возвращает следующую ошибку:</p><p>Ответ был отфильтрован из-за того, что запрос вызвал политику управления контентом Azure OpenAI. Пожалуйста, измените ваш запрос и попробуйте снова.</p><p>Вероятно, это не ваша вина. Но пока, пожалуйста, обновите страницу и поговорите с нашим чат-ботом о других вещах.</p>"},chat_error_other:{zh:"AI模型返回了一个错误。可能是因为您的提示或我们提供的上下文。对不起，请刷新并尝试新的内容。",en:"The AI model returns an error. It could be because of something in your prompt or the context that we provide. Sorry, please refresh and try something new.",es:"El modelo de IA devuelve un error. Podría ser por algo en su solicitud o en el contexto que proporcionamos. Lo siento, por favor recargue e intente algo nuevo.",
fr:"Le modèle d'IA renvoie une erreur. Cela pourrait être dû à quelque chose dans votre requête ou dans le contexte que nous fournissons. Désolé, veuillez rafraîchir et essayer quelque chose de nouveau.",de:"Das AI-Modell gibt einen Fehler zurück. Es könnte an etwas in Ihrer Eingabe oder dem von uns bereitgestellten Kontext liegen. Entschuldigung, bitte aktualisieren Sie die Seite und versuchen Sie etwas Neues.",ja:"AIモデルがエラーを返します。あなたのプロンプトまたは私たちが提供するコンテキストに何か問題がある可能性があります。申し訳ありませんが、リフレッシュして新しいことを試してください。",ko:"AI 모델이 오류를 반환합니다. 프롬프트나 제공된 컨텍스트에 무언가 문제가 있을 수 있습니다. 죄송합니다. 새로고침하고 새 시도를 해보세요.",pt:"O modelo de IA retorna um erro. Pode ser por causa de algo em sua solicitação ou no contexto que fornecemos. Desculpe, por favor, atualize e tente algo novo.",it:"Il modello di IA restituisce un errore. Potrebbe essere dovuto a qualcosa nella tua richiesta o nel contesto che forniamo. Scusa, aggiorna e prova qualcosa di nuovo.","zh-TW":"AI模型返回了一個錯誤。可能是因為您的提示或我們提供的上下文。對不起，請刷新並嘗試新的內容。","zh-HK":"AI模型返回了一個錯誤。可能是因為您的提示或我們提供的上下文。對不起，請刷新並嘗試新的內容。",ru:"Модель AI возвращает ошибку. Это может быть связано с чем-то в вашем запросе или предоставленном нами контексте. Извините, пожалуйста, обновите страницу и попробуйте что-нибудь новое."},chat_error_network:{zh:"我们的AI服务提供商出现了问题，我们现在无法连接。请稍后再试。",en:"Something is wrong with our AI vendor, we can't seem to connect to it right now. Please try later.",es:"Hay un problema con nuestro proveedor de IA, no podemos conectarnos en este momento. Por favor, intente más tarde.",fr:"Il y a un problème avec notre fournisseur de services IA, nous ne pouvons pas nous connecter pour le moment. Veuillez réessayer plus tard.",de:"Es gibt ein Problem mit unserem AI-Anbieter, wir können momentan keine Verbindung herstellen. Bitte versuchen Sie es später erneut.",ja:"AIサービス提供者に問題があり、現在接続できません。後でもう一度お試しください。",ko:"AI 제공업체에 문제가 있어 현재 연결할 수 없습니다. 나중에 다시 시도해 주세요.",pt:"Algo está errado com nosso fornecedor de IA, não conseguimos nos conectar no momento. Por favor, tente mais tarde.",it:"C'è qualcosa che non va con il nostro fornitore di IA, al momento non possiamo connetterci. Per favore, riprova più tardi.","zh-TW":"我們的AI服務提供商出現了問題，我們現在無法連接。請稍後再試。","zh-HK":"我們的AI服務提供商出現了問題，我們現在無法連接。請稍後再試。",ru:"Что-то не так с нашим поставщиком AI, мы не можем подключиться к нему прямо сейчас. Пожалуйста, попробуйте позже."},WaitMessage:{zh:"请等待[minutes]分钟再试。",en:"Please wait [minutes] minutes before resuming.",es:"Por favor, espere [minutes] minutos antes de reanudar.",fr:"Veuillez patienter [minutes] minutes avant de reprendre.",de:"Bitte warten Sie [minutes] Minuten, bevor Sie fortfahren.",ja:"[minutes]分間お待ちください。",ko:"[minutes]분 후에 다시 시도해주세요.",pt:"Por favor, espere [minutes] minutos antes de retomar.",it:"Si prega di attendere [minutes] minuti prima di riprendere.","zh-TW":"請等待[minutes]分鐘再試。","zh-HK":"請等待[minutes]分鐘再試。",ru:"Пожалуйста, подождите [minutes] минут, прежде чем продолжить."},RateLimitReminder:{zh:"您好！您已达到我们的聊天限制，即每3小时30条消息。",en:"Hi there! You’ve reached our chat limit of 30 messages every 3 hours.",es:"¡Hola! Ha alcanzado nuestro límite de 30 mensajes cada 3 horas.",fr:"Bonjour! Vous avez atteint notre limite de 30 messages toutes les 3 heures.",de:"Hallo! Sie haben unser Limit von 30 Nachrichten alle 3 Stunden erreicht.",ja:"こんにちは！3時間ごとに30通のメッセージの制限に達しました。",ko:"안녕하세요! 3시간마다 30개의 메시지 제한에 도달했습니다.",pt:"Olá! Você atingiu nosso limite de 30 mensagens a cada 3 horas.",it:"Ciao! Hai raggiunto il nostro limite di 30 messaggi ogni 3 ore.","zh-TW":"您好！您已達到我們的聊天限制，即每3小時30條消息。","zh-HK":"您好！您已達到我們的聊天限制，即每3小時30條消息。",ru:"Здравствуйте! Вы достигли нашего лимита в 30 сообщений каждые 3 часа."},OtherFeaturesReminder:{zh:"同时，您仍然可以查看您关注的最新新闻。感谢您的耐心等待！",en:"Meanwhile, you can still check the latest news you’ve followed. Thanks for your patience!",es:"Mientras tanto, aún puede consultar las últimas noticias que ha seguido. ¡Gracias por su paciencia!",fr:"En attendant, vous pouvez toujours consulter les dernières nouvelles que vous suivez. Merci pour votre patience!",de:"In der Zwischenzeit können Sie die neuesten Nachrichten, denen Sie folgen, weiterhin überprüfen. Vielen Dank für Ihre Geduld!",ja:"その間、フォローしている最新ニュースを確認できます。ご理解いただきありがとうございます！",ko:"그동안 팔로우한 최신 뉴스를 확인할 수 있습니다. 감사합니다!",pt:"Enquanto isso, você ainda pode verificar as últimas notícias que seguiu. Obrigado pela sua paciência!",it:"Nel frattempo, puoi comunque controllare le ultime notizie che hai seguito. Grazie per la tua pazienza!","zh-TW":"同時，您仍然可以查看您關注的最新新聞。感謝您的耐心等待！","zh-HK":"同時，您仍然可以查看您關注的最新新聞。感謝您的耐心等待！",ru:"Тем временем вы можете проверить последние новости, которые вы следили. Спасибо за ваше терпение!"},BackToTop:{zh:"从头开始",en:"Start Over",es:"Empezar de nuevo",fr:"Recommencer",de:"Von vorn beginnen",ja:"最初からやり直す",ko:"처음부터 다시 시작",pt:"Começar de novo",it:"Ricominciare","zh-TW":"","zh-HK":"",ru:"Начать заново"},DiscussArticle:{zh:"讨论文章",en:"Discuss Article",es:"Discutir Artículo",fr:"Discuter de l'article",de:"Artikel diskutieren",ja:"記事を議論する",ko:"글 논의",pt:"Discutir Artigo",it:"Discutere Articolo","zh-TW":"討論文章","zh-HK":"討論文章",ru:"Обсудить статью"},ChangeSubject:{en:"Change Subject",zh:"改变话题",es:"Cambiar Tema",fr:"Changer de sujet",de:"Thema ändern",ja:"話題を変える",ko:"주제 변경",pt:"Mudar de assunto",it:"Cambiare argomento","zh-TW":"改變話題","zh-HK":"改變話題",ru:"Изменить тему"},socratic:{zh:"苏格拉底诘问",en:"Socratic Method",es:"Método socrático",fr:"Méthode socratique",de:"Sokratische Methode",ja:"ソクラテス式問い掛け法",ko:"소크라테스적 방법",pt:"Método socrático",it:"Metodo socratico","zh-TW":"蘇格拉底質問","zh-HK":"蘇格拉底式質問",ru:"Сократический метод"},SearchFTAPI:{en:"Search FT",es:"Buscar FT",fr:"Rechercher FT",de:"FT suchen",ja:"FT検索",ko:"FT 검색",pt:"Pesquisar FT",it:"Cerca FT","zh-TW":"搜尋FT","zh-HK":"搜尋FT",zh:"搜索FT",ru:"Поиск FT"},DiscussContent:{en:"Talk about FT Content",zh:"讨论FT内容",es:"Hablar sobre el contenido de FT",fr:"Parler du contenu de FT",de:"Über FT-Inhalte sprechen",ja:"FTコンテンツについて話す",ko:"FT 콘텐츠에 대해 이야기하다",pt:"Falar sobre o conteúdo do FT",it:"Parlare del contenuto di FT","zh-TW":"討論FT內容","zh-HK":"討論FT內容",ru:"Обсуждение контента FT"},Other:{en:"Just Chat",es:"Solo Chat",fr:"Discussion",de:"Nur Chatten",ja:"チャットのみ",ko:"채팅만",pt:"Apenas Bate-papo",it:"Solo Chat","zh-TW":"隨便聊聊","zh-HK":"隨便聊聊",zh:"随便聊聊",ru:"Просто чат"},Detail:{en:"Detail",es:"Detalle",fr:"Détail",de:"Detail",ja:"詳細",ko:"세부사항",pt:"Detalhe",it:"Dettaglio","zh-TW":"詳細","zh-HK":"詳情",zh:"详情",ru:"Детали"},DetectingIntent:{zh:"正在尝试理解您的问题",en:"Attempting to understand your question",es:"Intentando entender su pregunta",fr:"Tentative de comprendre votre question",de:"Versuche, Ihre Frage zu verstehen",ja:"ご質問を理解しようとしています",ko:"질문을 이해하려고 시도 중",pt:"Tentando entender sua pergunta",it:"Tentativo di capire la tua domanda","zh-TW":"正在嘗試理解您的問題","zh-HK":"正在嘗試理解您的問題",ru:"Пытаюсь понять ваш вопрос"},GettingContext:{zh:"正在检查相关信息",en:"Checking relevant information",es:"Revisando la información relevante",fr:"Vérification des informations pertinentes",de:"Überprüfen relevanter Informationen",ja:"関連情報を確認しています",ko:"관련 정보 확인 중",pt:"Verificando informações relevantes",it:"Verificando le informazioni pertinenti","zh-TW":"正在檢查相關信息","zh-HK":"正在檢查相關信息",ru:"Проверка соответствующей информации"},GettingContextFromDB:{zh:"在相关档案中进行检索，寻找和您的问题相关的内容",en:"Retrieving from the database, looking for content related to your question",es:"Recuperando de la base de datos, buscando contenido relacionado con su pregunta",fr:"Récupération de la base de données, recherche de contenu lié à votre question",de:"Abrufen aus der Datenbank, Suche nach Inhalten, die sich auf Ihre Frage beziehen",ja:"データベースから情報を取得して、ご質問に関連する内容を探しています",ko:"데이터베이스에서 검색하여 귀하의 질문과 관련된 내용을 찾고 있습니다",pt:"Recuperando do banco de dados, procurando conteúdo relacionado à sua pergunta",it:"Recuperando dal database, cercando contenuti relativi alla tua domanda","zh-TW":"在相關檔案中進行檢索，尋找和您的問題相關的內容","zh-HK":"在相關檔案中進行檢索，尋找和您的問題相關的內容",ru:"Извлекаю из базы данных, ищу содержание, связанное с вашим вопросом"},GettingResult:{zh:"让我再想一下",en:"Let me think again",es siste à poser des questions pour découvrir les croyances sous-jacentes et tester la logique des réponses données. Elle est utilisée pour promouvoir la pensée critique, la résolution de problèmes et la créativité dans différents domaines.",de:"Die sokratische Methode ist eine Art des Fragens und Diskutierens von Ideen, um Annahmen herauszufordern und zu einem besseren Verständnis zu gelangen. Es beinhaltet Fragen, um zugrunde liegende Überzeugungen aufzudecken und die Logik der gegebenen Antworten zu prüfen. Es wird verwendet, um kritisches Denken, Problemlösung und Kreativität in verschiedenen Bereichen zu fördern.",ja:"ソクラテスの方法は、仮定に挑戦し、より良い理解に到達するための問いかけと議論の方法です。潜在的な信念を明らかにするために質問し、回答の論理をテストすることが含まれます。さまざまな分野で批判的思考、問題解決、創造性を促進するために使用されています。",ko:"소크라테스 방법은 가정을 도전하고 더 나은 이해를 도출하기 위해 아이디어에 대한 질문과 토론하는 방법입니다. 대답의 논리를 검증하고, 깔끔하지 않은 논리를 깨우쳐 신념을 드러냅니다. 다양한 분야에서 비판적 사고, 문제 해결 및 창의성을 촉진하는 데 사용됩니다.",pt:"O Método Socrático é uma maneira de questionar e discutir ideias para desafiar pressupostos e chegar a uma melhor compreensão. Envolve fazer perguntas para descobrir crenças subjacentes e testar a lógica das respostas dadas. É usado para promover o pensamento crítico, a resolução de problemas e a criatividade em várias áreas.",it:"Il Metodo Socratico è un modo di interrogare e discutere le idee per mettere in discussione le assunzioni e arrivare ad una migliore comprensione. Comprende l'arte di porre domande per scoprire le credenze sottostanti e testare la logica delle risposte date. È utilizzato per promuovere il pensiero critico, la risoluzione dei problemi e la creatività in vari campi.","zh-TW":"蘇格拉底詰問方法是一種質疑和討論觀念的方式，旨在挑戰假設並達到更好的理解。它涉及提出問題以揭示潛在信念並測試所給出的回應的邏輯。它用於在各個領域中促進批判性思維、問題解決和創造力。","zh-HK":"蘇格拉底詰問方法是一種質疑和討論觀念的方式，旨在挑戰假設並達到更好的理解。它涉及提出問題以揭示潛在信念並測試所給出的回應的邏輯。它用於在各個領域中促進批判性思維、問題解決和創造力。",ru:"Метод Сократа - это способ вопросительного и обсуждающего подхода к идеям, направленный на оспаривание предположений и достижение лучшего понимания. Он включает в себя задавание вопросо ,de:"Nachrichtenquiz",ja:"ニュースクイズ",ko:"뉴스 퀴즈",pt:"Quiz de notícias",it:"Quiz di notizie","zh-TW":"每日小測","zh-HK":"每日小測",ru:"Новостная викторина"},ChatDisclaimer:{en:"Chat bots can make mistakes. Consider checking important information.",zh:"聊天机器人可能会犯错误。请考虑核对重要信息。",es:"Los chatbots pueden cometer errores. Considere verificar la información importante.",fr:"Les chatbots peuvent faire des erreurs. Envisagez de vérifier les informations importantes.",de:"Chatbots können Fehler machen. Überlegen Sie, wichtige Informationen zu überprüfen.",ja:"チャットボットは間違いを犯すことがあります。重要な情報を確認することを検討してください。",ko:"챗봇은 실수를 할 수 있습니다. 중요한 정보를 확인하는 것을 고려해보세요.",pt:"Chatbots podem cometer erros. Considere verificar informações importantes.",it:"I chatbot possono commettere errori. Considera di controllare le informazioni importanti.","zh-TW":"聊天機器人可能會犯錯誤。請考慮核對重要資訊。","zh-HK":"聊天機械人可能會犯錯。請考慮核對重要資訊。",ru:"Чат-боты могут допускать ошибки. Рассмотрите возможность проверки важной информации."},chatVoiceInput:{zh:"语音输入",en:"Voice input","zh-TW":"語音輸入","zh-HK":"語音輸入"},chatVoiceStop:{zh:"停止录音",en:"Stop recording","zh-TW":"停止錄音","zh-HK":"停止錄音"},chatVoiceRecording:{zh:"正在录音 [seconds] 秒",en:"Recording [seconds]s","zh-TW":"正在錄音 [seconds] 秒","zh-HK":"正在錄音 [seconds] 秒"},chatVoiceProcessing:{zh:"正在识别语音...",en:"Transcribing...","zh-TW":"正在識別語音...","zh-HK":"正在識別語音..."},chatVoiceReady:{zh:"已填入输入框",en:"Added to the input box","zh-TW":"已填入輸入框","zh-HK":"已填入輸入框"},chatVoiceNotSupported:{zh:"当前浏览器不支持语音输入。",en:"Voice input is not supported by this browser.","zh-TW":"目前瀏覽器不支援語音輸入。","zh-HK":"目前瀏覽器不支援語音輸入。"},chatVoicePermissionDenied:{zh:"无法访问麦克风。请允许浏览器使用麦克风后重试。",en:"Unable to access the microphone. Please allow microphone access and try again.","zh-TW":"無法存取麥克風。請允許瀏覽器使用麥克風後重試。","zh-HK":"無法存取麥克風。請允許瀏覽器使用麥克風後重試。"},chatVoiceTooShort:{zh:"录音时间至少需要 1 秒，请重试。",en:"Record for at least 1 second. Please try again.","zh-TW":"錄音時間至少需要 1 秒，請重試。","zh-HK":"錄音時間至少需要 1 秒，請重試。"},chatVoiceTranscriptionFailed:{zh:"语音识别失败，请稍后重试。",en:"Voice transcription failed. Please try again later.","zh-TW":"語音識別失敗，請稍後重試。","zh-HK":"語音識別失敗，請稍後重試。"},chatVoiceEligibilityRequired:{zh:"语音输入仅对当前有效的高端 B2B 付费用户及授权内部账号开放。",en:"Voice input is available only to current premium B2B paid users and approved staff accounts.","zh-TW":"語音輸入僅對目前有效的高端 B2B 付費用戶及授權內部帳號開放。","zh-HK":"語音輸入僅對目前有效的高端 B2B 付費用戶及授權內部帳號開放。"},AccountSharingReminder:{en:"Your session has been securely ended on this device because your account was accessed from a new device. You can sign in on up to three different types of devices (mobile, tablet, and desktop) at a time. Please log in again if this was not you.",zh:"由于您的帐户已在新设备上访问，您在此设备上的会话已安全结束。您可以同时在三种不同类型的设备（手机、平板和桌面）上登录。如果这不是您的操作，请重新登录。",es:"Tu sesión ha sido cerrada de forma segura en este dispositivo porque tu cuenta fue accedida desde un nuevo dispositivo. Puedes iniciar sesión en hasta tres tipos diferentes de dispositivos (móvil, tableta y escritorio) al mismo tiempo. Por favor, inicia sesión de nuevo si no fuiste tú.",fr:"Votre session a été sécurisée et terminée sur cet appareil car votre compte a été accédé depuis un nouvel appareil. Vous pouvez vous connecter sur jusqu'à trois types d'appareils différents (mobile, tablette et ordinateur) en même temps. Veuillez vous reconnecter si ce n'était pas vous.",de:"Ihre Sitzung wurde auf diesem Gerät sicher beendet, da auf Ihr Konto von einem neuen Gerät zugegriffen wurde. Sie können sich gleichzeitig auf bis zu drei verschiedenen Gerätetypen (Mobil, Tablet und Desktop) anmelden. Bitte melden Sie sich erneut an, wenn Sie dies nicht waren.",ja:"あなたのアカウントが新しいデバイスからアクセスされたため、このデバイスでのセッションは安全に終了しました。一度に最大3種類のデバイス（モバイル、タブレット、デスクトップ）でサインインできます。あなたの操作でない場合は、もう一度ログインしてください。",ko:"귀하의 계정이 새로운 기기에서 접근되었기 때문에 이 기기에서의 세션이 안전하게 종료되었습니다. 한 번에 최대 세 가지 유형의 기기(모바일, 태블릿, 데스크톱)에 로그인할 수 있습니다. 본인이 아닌 경우 다시 로그인해 주세요.",pt:"Sua sessão foi encerrada de forma segura neste dispositivo porque sua conta foi acessada por um novo dispositivo. Você pode se conectar em até três tipos diferentes de dispositivos (móvel, tablet e desktop) ao mesmo tempo. Por favor, faça login novamente se não foi você.",it:"La tua sessione è stata terminata in modo sicuro su questo dispositivo perché il tuo account è stato accesso da un nuovo dispositivo. Puoi accedere su fino a tre tipi diversi di dispositivi (mobile, tablet e desktop) contemporaneamente. Per favore, accedi nuovamente se non sei stato tu.","zh-TW":"由於您的帳戶已在新設備上訪問，您在此設備上的會話已安全結束。您可以同時在三種不同類型的設備（手機、平板和桌面）上登錄。如果這不是您的操作，請重新登錄。","zh-HK":"由於您的帳戶已在新設備上訪問，您在此設備上的會話已安全結束。您可以同時在三種不同類型的設備（手機、平板和桌面）上登錄。如果這不是您的操作，請重新登錄。",ru:"Ваш сеанс на этом устройстве был безопасно завершен, поскольку доступ к вашей учетной записи был осуществлен с нового устройства. Вы можете войти сразу на трех разных типах устройств (мобильный, планшет и настольный компьютер). Пожалуйста, войдите снова, если это были не вы."},pleaseWait:{zh:"请稍候...",en:"Please wait for a while...",es:"Por favor espera un momento...",fr:"Veuillez patienter un moment...",de:"Bitte warten Sie einen Moment...",ja:"しばらくお待ちください...",ko:"잠시만 기다려 주세요...",pt:"Por favor, espere um momento...",it:"Per favore, attendi un momento...","zh-TW":"請稍候...","zh-HK":"請稍候...",ru:"Пожалуйста, подождите немного..."},CheckIfUserWantsToRemoveAccount:{zh:"您确定要注销您的账户吗？",en:"Are you sure you want to remove your account?",es:"¿Estás seguro de que deseas eliminar tu cuenta?",fr:"Êtes-vous sûr de vouloir supprimer votre compte ?",de:"Möchten Sie Ihr Konto wirklich löschen?",ja:"本当にアカウントを削除しますか？",ko:"정말로 계정을 삭제하시겠습니까?",pt:"Tem certeza de que deseja remover sua conta?",it:"Sei sicuro di voler rimuovere il tuo account?","zh-TW":"您確定要註銷您的帳戶嗎？","zh-HK":"您確定要註銷您的帳戶嗎？",ru:"Вы уверены, что хотите удалить свой аккаунт?"},WarnAboutLosingAllInformationConnectedToTheAccount:{zh:"此操作无法撤销，请谨慎进行。注销账户之后，您的所有注册信息，包括订阅权益将完全删除，无法找回。",en:"This action is irreversible. Removing your account will delete all your registered information, including subscription rights, permanently and cannot be recovered.",es:"Esta acción es irreversible. Eliminar tu cuenta eliminará toda tu información registrada, incluidos los derechos de suscripción, de forma permanente y no se podrá recuperar.",fr:"Cette action est irréversible. La suppression de votre compte supprimera toutes vos informations enregistrées, y compris les droits d'abonnement, de manière permanente et ne pourra pas être récupérée.",de:"Diese Aktion ist unwiderruflich. Durch das Löschen Ihres Kontos werden alle Ihre registrierten Informationen, einschließlich Abonnementrechte, dauerhaft gelöscht und können nicht wiederhergestellt werden.",ja:"この操作は元に戻せません。アカウントを削除すると、登録情報や購読権を含むすべての情報が完全に削除され、復元できません。",ko:"이 작업은 되돌릴 수 없습니다. 계정을 삭제하면 등록된 모든 정보(구독 권한 포함)가 영구적으로 삭제되며 복구할 수 없습니다.",pt:"Esta ação é irreversível. Remover sua conta excluirá todas as informações registradas, incluindo direitos de assinatura, permanentemente e não poderá ser recuperado.",it:"Questa azione è irreversibile. La rimozione del tuo account eliminerà tutte le informazioni registrate, inclusi i diritti di abbonamento, in modo permanente e non potranno essere recuperati.","zh-TW":"此操作無法撤銷，請謹慎進行。註銷帳戶之後，您的所有註冊信息，包括訂閱權益將完全刪除，無法找回。","zh-HK":"此操作無法撤銷，請謹慎進行。註銷帳戶之後，您的所有註冊信息，包括訂閱權益將完全刪除，無法找回。",ru:"Это действие необратимо. Удаление вашей учетной записи приведет к безвозвратному удалению всей зарегистрированной информации, включая права на подписку."},lastCheckAboutRemovingAccount:{zh:"最后一次确认，您真的要注销账户，删除所有信息吗？",en:"Final confirmation: Are you sure you want to remove your account and delete all information?",es:"Confirmación final: ¿Estás seguro de que deseas eliminar tu cuenta y toda la información?",fr:"Confirmation finale : Êtes-vous sûr de vouloir supprimer votre compte et toutes vos informations ?",de:"Letzte Bestätigung: Möchten Sie Ihr Konto und alle Informationen wirklich löschen?",ja:"最終確認: アカウントを削除し、すべての情報を削除してもよろしいですか？",ko:"최종 확인: 계정을 삭제하고 모든 정보를 삭제하시겠습니까?",pt:"Confirmação final: Tem certeza de que deseja remover sua conta e excluir todas as informações?",it:"Conferma finale: Sei sicuro di voler rimuovere il tuo account ed eliminare tutte le informazioni?","zh-TW":"最後一次確認，您真的要註銷帳戶，刪除所有信息嗎？","zh-HK":"最後一次確認，您真的要註銷帳戶，刪除所有信息嗎？",ru:"Последнее подтверждение: Вы уверены, что хотите удалить свою учетную запись и всю информацию?"},sixDigitCodeFromEmail:{zh:"来自您邮箱的6位数验证码",en:"6-digit code from your email",es:"Código de 6 dígitos de tu correo electrónico",fr:"Code à 6 chiffres de votre e-mail",de:"6-stelliger Code aus Ihrer E-Mail",ja:"メールからの6桁のコード",ko:"이메일에서 받은 6자리 코드",pt:"Código de 6 dígitos do seu e-mail",it:"Codice a 6 cifre dalla tua email","zh-TW":"來自您郵箱的6位數驗證碼","zh-HK":"來自您郵箱的6位數驗證碼",ru:"6-значный код из вашего письма"},sixDigitCodeFromMobile:{zh:"通过短信发到您手机的6位数验证码",en:"6-digit code sent to your mobile via SMS",es:"Código de 6 dígitos enviado a tu móvil por SMS",fr:"Code à 6 chiffres envoyé sur votre mobile par SMS",de:"6-stelliger Code, per SMS an Ihr Handy gesendet",ja:"SMSで送信された6桁のコード",ko:"SMS로 전송된 6자리 코드",pt:"Código de 6 dígitos enviado por SMS para o seu celular",it:"Codice a 6 cifre inviato al tuo cellulare tramite SMS","zh-TW":"簡訊已發送至您的手機，請輸入6位數驗證碼","zh-HK":"短訊已發送至您的手機，請輸入6位數驗證碼",ru:"6-значный код, отправленный на ваш телефон по SMS"},yourName:{zh:"您可以使用用户名来登录",en:"You can use your username to log in",es:"Puedes usar tu nombre de usuario para iniciar sesión",fr:"Vous pouvez utiliser votre nom d'utilisateur pour vous connecter",de:"Sie können Ihren Benutzernamen verwenden, um sich anzumelden",ja:"ユーザー名を使用してログインできます",ko:"사용자 이름을 사용하여 로그인할 수 있습니다",pt:"Você pode usar seu nome de usuário para fazer login",it:"Puoi usare il tuo nome utente per accedere","zh-TW":"您可以使用用戶名稱來登入","zh-HK":"您可以使用用戶名稱來登入",ru:"Вы можете использовать свое имя пользователя для входа"},setSecurePassword:{zh:"设置安全密码：8个以上字符，包含大写、小写、数字和特殊字符。请勿使用与其他服务相同的密码。",en:"Set a secure password: 8+ chars, uppercase, lowercase, number, and special character. Never reuse a password from another service.",es:"Establezca una contraseña segura: 8+ caracteres, mayúsculas, minúsculas, número y carácter especial. Nunca reutilice una contraseña de otro servicio.",fr:"Définissez un mot de passe sécurisé : 8+ caractères, majuscules, minuscules, chiffre et caractère spécial. Ne réutilisez jamais un mot de passe provenant d’un autre service.",de:"Erstellen Sie ein sicheres Passwort: 8+ Zeichen, Großbuchstaben, Kleinbuchstaben, Zahl und Sonderzeichen. Verwenden Sie niemals dasselbe Passwort für andere Dienste.",ja:"セキュリティの高いパスワードを設定してください：8文字以上、大文字、小文字、数字、特殊文字。ほかのサービスで使用したパスワードは再利用しないでください。",ko:"보안 비밀번호 설정: 8자 이상, 대문자, 소문자, 숫자 및 특수 문자. 다른 서비스에서 사용한 비밀번호를 재사용하지 마세요.",pt:"Defina uma senha segura: 8+ caracteres, maiúsculas, minúsculas, número e caractere especial. Nunca reutilize uma senha de outro serviço.",it:"Imposta una password sicura: 8+ caratteri, maiuscole, minuscole, numero e carattere speciale. Non riutilizzare mai la stessa password per altri servizi.","zh-TW":"設置安全密碼：8個以上字符，包含大寫、小寫、數字和特殊字符。請勿使用與其他服務相同的密碼。","zh-HK":"設置安全密碼：8個以上字符，包含大寫、小寫、數字和特殊字符。請勿使用與其他服務相同的密碼。",ru:"Установите надежный пароль: более 8 символов, заглавные и строчные буквы, цифра и специальный символ. Никогда не используйте тот же пароль, что и для других сервисов."},passwordRuleLength:{zh:"8个以上字符",en:"8+ characters",es:"8+ caracteres",fr:"8+ caractères",de:"8+ Zeichen",ja:"8文字以上",ko:"8자 이상",pt:"8+ caracteres",it:"8+ caratteri","zh-TW":"8個以上字符","zh-HK":"8個以上字符",ru:"более 8 символов"},passwordRuleUppercase:{zh:"包含大写",en:"Include uppercase",es:"Incluir mayúsculas",fr:"Inclure des majuscules",de:"Großbuchstaben einschließen",ja:"大文字を含む",ko:"대문자 포함",pt:"Incluir maiúsculas",it:"Includi maiuscole","zh-TW":"包含大寫","zh-HK":"包含大寫",ru:"Включать заглавные буквы"},passwordRuleLowercase:{zh:"包含小写",en:"Include lowercase",es:"Incluir minúsculas",fr:"Inclure des minuscules",de:"Kleinbuchstaben einschließen",ja:"小文字を含む",ko:"소문자 포함",pt:"Incluir minúsculas",it:"Includi minuscole","zh-TW":"包含小寫","zh-HK":"包含小寫",ru:"Включать строчные буквы"},passwordRuleNumber:{zh:"包含数字",en:"Include a number",es:"Incluir un número",fr:"Inclure un chiffre",de:"Eine Zahl einschließen",ja:"数字を含む",ko:"숫자 포함",pt:"Incluir um número",it:"Includi un numero","zh-TW":"包含數字","zh-HK":"包含數字",ru:"Включать цифру"},passwordMustContain:{zh:"密码必须包含大写字母、小写字母、数字和特殊字符，请勿使用曾在其他服务中使用过的密码",en:"Password must contain uppercase, lowercase, number, and special character, never reuse a password used for another service",es:"La contraseña debe contener mayúsculas, minúsculas, números y caracteres especiales, nunca reutilice una contraseña utilizada en otro servicio",fr:"Le mot de passe doit contenir des majuscules, des minuscules, des chiffres et des caractères spéciaux, ne réutilisez jamais un mot de passe utilisé pour un autre service",de:"Passwort muss Großbuchstaben, Kleinbuchstaben, Zahlen und Sonderzeichen enthalten, verwenden Sie niemals ein Passwort, das für einen anderen Dienst verwendet wurde",ja:"パスワードには大文字、小文字、数字、および特殊文字を含める必要があります。他のサービスで使用したパスワードは再利用しないでください",ko:"비밀번호에는 대문자, 소문자, 숫자 및 특수 문자가 포함되어야 합니다, 다른 서비스에서 사용한 비밀번호를 재사용하지 마세요",pt:"A senha deve conter letras maiúsculas, minúsculas, números e caracteres especiais, nunca reutilize uma senha usada em outro serviço",it:"La password deve contenere lettere maiuscole, minuscole, numeri e caratteri speciali, non riutilizzare mai una password usata per un altro servizio","zh-TW":"密碼必須包含大寫字母、小寫字母、數字和特殊字符，請勿使用曾在其他服務中使用過的密碼","zh-HK":"密碼必須包含大寫字母、小寫字母、數字和特殊字符，請勿使用曾在其他服務中使用過的密碼",ru:"Пароль должен содержать заглавные и строчные буквы, цифры и специальные символы, никогда не используйте пароль, который использовался для других сервисов"},passwordRuleSpecialCharacter:{zh:"包含至少一个特殊字符，例如: !@#$%^&*",en:"Include at least one special character, such as: !@#$%^&*",es:"Incluye al menos un carácter especial, como: !@#$%^&*",fr:"Inclure au moins un caractère spécial, tel que : !@#$%^&*",de:"Schließen Sie mindestens ein Sonderzeichen ein, z.B.: !@#$%^&*",ja:"少なくとも1つの特殊文字を含めてください。例：!@#$%^&*",ko:"다음과 같은 특수 문자를 하나 이상 포함하십시오: !@#$%^&*",pt:"Inclua pelo menos um caractere espec dung verwenden. Möchten Sie sie wirklich entbinden?",ja:"この番号をログインに使用しなくなります。本当に解除してもよろしいですか？",ko:"이 번호를 더 이상 로그인에 사용하지 않습니다. 연결을 해제하시겠습니까?",pt:"Você não usará mais este número para fazer login. Tem certeza de que deseja desvinculá-lo?",it:"Non utilizzerai più questo numero per accedere. Sei sicuro di volerlo scollegare?","zh-TW":"不再使用這個號碼來登錄，確定要解除綁定嗎？","zh-HK":"不再使用這個號碼來登錄，確定要解除綁定嗎？",ru:"Вы больше не будете использовать этот номер для входа. Вы уверены, что хотите отвязать его?"},error_unbinding_wechat:{en:"Sorry, there was a problem on the server. We couldn't unbind WeChat at this time. Please try again later.",zh:"对不起，服务器端有一些问题，暂时无法解绑微信，请稍后再试。",es:"Lo siento, hubo un problema en el servidor. No pudimos desvincular WeChat en este momento. Por favor, inténtelo de nuevo más tarde.",fr:"Désolé, il y a eu un problème sur le serveur. Nous n'avons pas pu dissocier WeChat pour le moment. Veuillez réessayer plus tard.",de:"Entschuldigung, es gab ein Problem auf dem Server. Wir konnten WeChat derzeit nicht entbinden. Bitte versuchen Sie es später erneut.",ja:"申し訳ありませんが、サーバーで問題が発生しました。現在、WeChatの連携を解除できません。後でもう一度お試しください。",ko:"죄송합니다. 서버에 문제가 발생했습니다. 지금은 WeChat 연결을 해제할 수 없습니다. 나중에 다시 시도해 주세요.",pt:"Desculpe, houve um problema no servidor. Não foi possível desvincular o WeChat no momento. Por favor, tente novamente mais tarde.",it:"Spiacenti, si è verificato un problema sul server. Non è stato possibile scollegare WeChat al momento. Per favore, riprova più tardi.","zh-TW":"對不起，伺服器端有一些問題，暫時無法解除微信綁定，請稍後再試。","zh-HK":"對不起，伺服器端有一些問題，暫時無法解除微信綁定，請稍後再試。",ru:"Извините, возникла проблема на сервере. Мы не смогли отвязать WeChat. Пожалуйста, попробуйте позже."},error_unbinding_mobile:{zh:"对不起，服务器端有一些问题，暂时无法解绑手机号码，请稍后再试。",en:"Sorry, there was a problem on the server. We couldn't unbind your phone number at this time. Please try again later.",es:"Lo siento, hubo un problema en el servidor. No pudimos desvincular su número de teléfono en este momento. Por favor, inténtelo de nuevo más tarde."
